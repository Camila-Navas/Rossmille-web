version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: rossmille_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootRossMille2024
      MYSQL_DATABASE: rossmille_db
      MYSQL_USER: RossMille
      MYSQL_PASSWORD: RossMillB01
    ports:
      - "3306:3306"
    volumes:
      - rossmille_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

volumes:
  rossmille_data:
    name: rossmille_data
