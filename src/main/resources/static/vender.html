<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSS MILLE - Vender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/rossmille.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        html, body { height: 100%; }
        body { background-color: var(--rm-bg); }
        .pos-shell { display: flex; flex-direction: column; height: 100vh; }
        .pos-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }
        .panel-busqueda {
            width: 420px;
            min-width: 320px;
            background: var(--rm-white);
            border-right: 1px solid var(--rm-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-busqueda .panel-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--rm-border); }
        .panel-busqueda .panel-header h2 {
            font-family: var(--rm-font-heading);
            font-weight: 700; color: var(--rm-text); margin: 0 0 10px;
            font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
        }
        .resultado-lista { overflow-y: auto; flex: 1; padding: 8px 0; }
        .resultado-item { padding: 10px 20px; cursor: pointer; border-bottom: 1px solid var(--rm-border); transition: background var(--rm-transition-fast); }
        .resultado-item:hover, .resultado-item:focus-visible { background: var(--rm-bg); }
        .resultado-item .nombre { font-weight: 600; font-size: 0.88rem; color: var(--rm-text); }
        .resultado-item .detalle { font-size: 0.78rem; color: var(--rm-text-2); margin-top: 2px; }
        .resultado-item .precio { font-weight: 700; color: var(--rm-text); font-size: 0.9rem; float: right; }
        .resultado-item.sin-stock { opacity: 0.45; cursor: not-allowed; }
        .badge-stock-bajo { background: #fff3cd; color: #856404; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
        .badge-agotado { background: #fde8d8; color: #b94a00; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }

        .panel-carrito { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
        .carrito-header { padding: 16px 24px 12px; border-bottom: 1px solid var(--rm-border); background: var(--rm-white); }
        .carrito-header h2 {
            font-family: var(--rm-font-heading);
            font-weight: 700; color: var(--rm-text); margin: 0;
            font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
        }
        .carrito-items { flex: 1; overflow-y: auto; padding: 8px 24px; background: var(--rm-white); }
        .carrito-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--rm-border); flex-wrap: wrap; }
        .carrito-item .ci-nombre { flex: 1; min-width: 140px; font-size: 0.88rem; font-weight: 600; color: var(--rm-text); }
        .carrito-item .ci-precio { font-size: 0.82rem; color: var(--rm-text-2); min-width: 90px; text-align: right; }
        .carrito-item .ci-subtotal { font-weight: 700; font-size: 0.9rem; min-width: 100px; text-align: right; color: var(--rm-text); }
        .ci-qty { display: flex; align-items: center; gap: 6px; }
        .ci-qty button {
            width: 26px; height: 26px; border: 1px solid var(--rm-border); background: var(--rm-bg);
            border-radius: var(--rm-radius-sm); cursor: pointer; font-size: 0.9rem; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--rm-font-body); color: var(--rm-text);
        }
        .ci-qty button:hover { background: var(--rm-accent-tint); border-color: var(--rm-accent); }
        .ci-qty .qty-val { min-width: 24px; text-align: center; font-weight: 600; font-size: 0.88rem; }
        .btn-quitar { background: transparent; border: none; color: var(--rm-danger); font-size: 1rem; cursor: pointer; padding: 4px; }
        .carrito-vacio { text-align: center; color: var(--rm-text-2); padding: 48px 0; font-size: 0.9rem; }

        .panel-resumen { background: var(--rm-white); border-top: 1px solid var(--rm-border); padding: 16px 24px 20px; }
        .resumen-fila { display: flex; justify-content: space-between; align-items: center; font-size: 0.88rem; margin-bottom: 6px; color: var(--rm-text); gap: 8px; }
        .resumen-fila.total { font-size: 1.1rem; font-weight: 800; color: var(--rm-text); margin-top: 6px; padding-top: 8px; border-top: 1.5px solid var(--rm-border); }
        .input-descuento { width: 130px; text-align: right; border: 1px solid var(--rm-border); border-radius: var(--rm-radius-sm); padding: 3px 8px; font-size: 0.88rem; font-family: var(--rm-font-body); background: var(--rm-white); color: var(--rm-text); }
        .select-pago { border: 1px solid var(--rm-border); border-radius: var(--rm-radius-sm); padding: 4px 8px; font-size: 0.88rem; background: var(--rm-white); color: var(--rm-text); font-family: var(--rm-font-body); }
        .input-cliente { width: 100%; border: 1px solid var(--rm-border); border-radius: var(--rm-radius-sm); padding: 5px 10px; font-size: 0.85rem; margin-top: 4px; font-family: var(--rm-font-body); background: var(--rm-white); color: var(--rm-text); }
        .btn-finalizar {
            background: var(--rm-accent); color: #fff; border: none; border-radius: var(--rm-radius);
            padding: 10px 0; width: 100%; font-size: 0.95rem; font-weight: 700; cursor: pointer;
            margin-top: 14px; letter-spacing: 1px; transition: background var(--rm-transition-fast);
            font-family: var(--rm-font-body);
        }
        .btn-finalizar:hover { background: var(--rm-accent-h); }
        .btn-finalizar:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-limpiar {
            background: transparent; border: 1px solid var(--rm-border); color: var(--rm-text-2);
            border-radius: var(--rm-radius); padding: 8px 0; width: 100%; font-size: 0.85rem;
            cursor: pointer; margin-top: 6px; font-family: var(--rm-font-body);
        }
        .btn-limpiar:hover { background: var(--rm-bg); }
        .ticket-body {
            font-family: 'Courier New', monospace; font-size: 0.82rem;
            background: var(--rm-bg); border-radius: var(--rm-radius-sm); padding: 18px;
            white-space: pre; line-height: 1.6; color: var(--rm-text); overflow-x: auto;
        }

        /* Mobile: apilar panel de busqueda encima del carrito en vez de lado a lado */
        @media (max-width: 767.98px) {
            .pos-shell { height: auto; min-height: 100vh; }
            .pos-layout { flex-direction: column; overflow: visible; }
            .panel-busqueda { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--rm-border); max-height: 45vh; }
            .panel-carrito { overflow: visible; }
            .carrito-items { max-height: 40vh; }
        }
    </style>
</head>
<body>

<a class="skip-link" href="#main" data-i18n="a11y.skipToContent">Saltar al contenido principal</a>
<div id="rmDrawerBackdrop" class="rm-drawer-backdrop"></div>
<div id="rmSidebarMount"></div>

<div class="pos-shell rm-has-sidebar">
<div id="rmTopbarMount"></div>

<main id="main" class="pos-layout">

    <!-- Panel izquierdo: busqueda de productos -->
    <section class="panel-busqueda" aria-label="Busqueda de productos">
        <div class="panel-header">
            <h2>Productos</h2>
            <label class="visually-hidden-focusable" for="inputBusqueda">Buscar producto por nombre</label>
            <input type="text" id="inputBusqueda" class="form-control form-control-sm"
                placeholder="Buscar por nombre..." autocomplete="off">
        </div>
        <div class="resultado-lista" id="resultadoLista" aria-live="polite">
            <div class="carrito-vacio">Escribe para buscar un producto</div>
        </div>
    </section>

    <!-- Panel derecho: carrito -->
    <section class="panel-carrito" aria-label="Carrito de venta">
        <div class="carrito-header">
            <h2>Carrito</h2>
        </div>
        <div class="carrito-items" id="carritoItems" aria-live="polite">
            <div class="carrito-vacio" id="carritoVacio">El carrito esta vacio</div>
        </div>
        <div class="panel-resumen">
            <div class="resumen-fila">
                <label for="inputCliente">Cliente (opcional)</label>
            </div>
            <div style="margin-bottom:10px;">
                <input type="text" id="inputCliente" class="input-cliente"
                    placeholder="ID del cliente (opcional)" autocomplete="off">
            </div>
            <div class="resumen-fila">
                <span>Subtotal</span>
                <span id="subtotalVal">$0</span>
            </div>
            <div class="resumen-fila">
                <label for="inputDescuento">Descuento ($)</label>
                <input type="number" id="inputDescuento" class="input-descuento"
                    min="0" step="100" value="0" placeholder="0">
            </div>
            <div class="resumen-fila">
                <label for="selectPago">Metodo de pago</label>
                <select id="selectPago" class="select-pago">
                    <option value="Efectivo">Efectivo</option>
                    <option value="Tarjeta">Tarjeta</option>
                    <option value="Transferencia">Transferencia</option>
                </select>
            </div>
            <div class="resumen-fila total">
                <span>TOTAL</span>
                <span id="totalVal">$0</span>
            </div>
            <button class="btn-finalizar" id="btnFinalizar" disabled
                onclick="finalizarVenta()">FINALIZAR VENTA</button>
            <button class="btn-limpiar" onclick="limpiarCarrito()">Limpiar carrito</button>
        </div>
    </section>
</main>
</div>

<!-- Modal ticket -->
<div class="modal fade" id="modalTicket" tabindex="-1" aria-labelledby="modalTicketTitulo">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h6 class="modal-title fw-bold" id="modalTicketTitulo">Venta registrada</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body pt-2">
                <div class="ticket-body" id="ticketBody"></div>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-primary w-100"
                    data-bs-dismiss="modal" onclick="limpiarCarrito()">
                    Nueva venta
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal error -->
<div class="modal fade" id="modalError" tabindex="-1" aria-labelledby="modalErrorTitulo">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-body text-center py-4">
                <h6 id="modalErrorTitulo" class="visually-hidden">Error</h6>
                <div style="font-size:1.8rem; margin-bottom:10px; color:var(--rm-danger);">
                    <i class="bi bi-exclamation-triangle" aria-hidden="true"></i>
                </div>
                <div id="errorMsg" style="font-size:0.9rem; color:var(--rm-text);" role="alert"></div>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-outline-secondary w-100"
                    data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/rossmille.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/vender.js"></script>
<script>
    initApp({ activeKey: 'vender', titleKey: 'page.vender.title', subtitleKey: 'page.vender.subtitle' });
</script>
</body>
</html>
