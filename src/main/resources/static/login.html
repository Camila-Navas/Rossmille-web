<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSS MILLE - Iniciar Sesion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/rossmille.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        body {
            background-color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .brand-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 4px;
        }
        .brand-sub {
            text-align: center;
            color: #888;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 36px;
        }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1.5px solid #e0e0e0;
            padding: 10px 14px;
            font-size: 0.95rem;
        }
        .btn-login {
            background-color: #1a1a2e;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            width: 100%;
            margin-top: 8px;
            transition: background-color 0.2s;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            cursor: pointer;
        }
        .btn-login:hover { background-color: #2d2d4e; color: #fff; }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg {
            display: none;
            background-color: #fff3f3;
            border: 1px solid #f5c6cb;
            color: #842029;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.88rem;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-title">ROSS MILLE</div>
        <div class="brand-sub">Sistema de Punto de Venta</div>

        <form id="loginForm" novalidate>
            <div class="mb-3">
                <label class="form-label" for="inputId">ID de Usuario</label>
                <input type="text" class="form-control" id="inputId"
                    placeholder="Ingrese su ID" required autocomplete="username">
            </div>
            <div class="mb-3">
                <label class="form-label" for="selectCargo">Cargo</label>
                <select class="form-select" id="selectCargo" required>
                    <option value="" disabled selected>Seleccionar cargo</option>
                    <option value="Administrador">Administrador</option>
                    <option value="Empleado">Empleado</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label" for="inputContrasena">Contrasena</label>
                <input type="password" class="form-control" id="inputContrasena"
                    placeholder="Ingrese su contrasena" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login" id="btnLogin">Iniciar Sesion</button>
            <div class="error-msg" id="errorMsg"></div>
        </form>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
