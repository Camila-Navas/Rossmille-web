<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSS MILLE - Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/rossmille.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .toolbar .search-wrap { display: flex; gap: 6px; flex: 1; min-width: 220px; }
        .toolbar input.search-input {
            flex: 1; border: 1.5px solid var(--rm-border); border-radius: var(--rm-radius);
            padding: 8px 14px; font-size: 0.9rem; outline: none;
            transition: border-color var(--rm-transition-fast); font-family: var(--rm-font-body);
            background: var(--rm-white); color: var(--rm-text);
        }
        .toolbar input.search-input:focus { border-color: var(--rm-accent); }
        .btn-buscar, .btn-limpiar, .btn-nuevo {
            border: none; border-radius: var(--rm-radius); padding: 8px 16px;
            font-size: 0.88rem; cursor: pointer; white-space: nowrap; font-family: var(--rm-font-body);
            transition: background var(--rm-transition-fast);
        }
        .btn-buscar { background: var(--rm-accent); color: #fff; }
        .btn-buscar:hover { background: var(--rm-accent-h); }
        .btn-limpiar { background: var(--rm-neutral); color: #fff; }
        .btn-limpiar:hover { background: var(--rm-neutral-h); }
        .btn-nuevo { background: var(--rm-success); color: #fff; padding: 8px 18px; font-weight: 600; }
        .btn-nuevo:hover { background: var(--rm-success-h); }
        .badge-stock-alerta {
            background: #fff3cd; border: 1px solid #ffc107; color: #664d03;
            border-radius: var(--rm-radius-sm); padding: 5px 12px; font-size: 0.8rem; font-weight: 600; white-space: nowrap;
        }

        .producto-card {
            background: var(--rm-white); border-radius: var(--rm-radius); border: 1.5px solid var(--rm-border);
            padding: 16px; display: flex; flex-direction: column; gap: 6px;
            box-shadow: var(--rm-shadow-sm); transition: box-shadow var(--rm-transition-fast);
        }
        .producto-card:hover { box-shadow: var(--rm-shadow-md); }
        .card-agotado { border-color: var(--rm-danger); }
        .card-stock-bajo { border-color: var(--rm-warning); }
        .card-header-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag-cat { background: var(--rm-accent-tint); color: var(--rm-accent); border-radius: 4px; padding: 2px 8px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; }
        .tag-talla { background: var(--rm-bg); color: var(--rm-text-2); border-radius: 4px; padding: 2px 8px; font-size: 0.72rem; font-weight: 600; }
        .card-nombre { font-size: 0.97rem; font-weight: 700; color: var(--rm-text); line-height: 1.3; }
        .card-desc {
            font-size: 0.8rem; color: var(--rm-text-2); margin: 0;
            overflow: hidden; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }
        .card-meta { font-size: 0.78rem; color: var(--rm-text-2); }
        .card-stock-row { font-size: 0.83rem; color: var(--rm-text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .stock-num { font-weight: 600; }
        .badge-agotado { background: var(--rm-danger); color: #fff; font-size: 0.68rem; padding: 2px 7px; border-radius: 4px; font-weight: 700; letter-spacing: 0.5px; }
        .badge-stock-bajo { background: var(--rm-warning); color: #333; font-size: 0.68rem; padding: 2px 7px; border-radius: 4px; font-weight: 700; }
        .card-precio { font-size: 1.05rem; font-weight: 700; color: var(--rm-text); margin-top: 4px; }
        .card-acciones { display: flex; gap: 8px; margin-top: auto; padding-top: 10px; border-top: 1px solid var(--rm-border); }
        .btn-card-editar { flex: 1; background: var(--rm-accent); color: #fff; border: none; border-radius: var(--rm-radius-sm); padding: 6px 0; font-size: 0.82rem; cursor: pointer; font-family: var(--rm-font-body); }
        .btn-card-editar:hover { background: var(--rm-accent-h); }
        .btn-card-eliminar { flex: 1; background: transparent; color: var(--rm-danger); border: 1.5px solid var(--rm-danger); border-radius: var(--rm-radius-sm); padding: 6px 0; font-size: 0.82rem; cursor: pointer; font-family: var(--rm-font-body); }
        .btn-card-eliminar:hover { background: var(--rm-danger); color: #fff; }

        .filtros-wrap { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .filtros-label { font-size: 0.78rem; font-weight: 600; color: var(--rm-text-2); text-transform: uppercase; letter-spacing: 0.4px; margin-right: 4px; }
        .filtro-chip {
            background: var(--rm-bg); color: var(--rm-text-2); border: 1.5px solid transparent;
            border-radius: var(--rm-radius-pill); padding: 4px 14px; font-size: 0.8rem; font-weight: 600;
            cursor: pointer; transition: all var(--rm-transition-fast); font-family: var(--rm-font-body);
        }
        .filtro-chip:hover { background: var(--rm-accent-tint); }
        .filtro-chip.active { background: var(--rm-accent); color: #fff; border-color: var(--rm-accent); }
    </style>
</head>
<body class="rm-has-sidebar">

<a class="skip-link" href="#main" data-i18n="a11y.skipToContent">Saltar al contenido principal</a>
<div id="rmDrawerBackdrop" class="rm-drawer-backdrop"></div>
<div id="rmSidebarMount"></div>
<div id="rmTopbarMount"></div>

<main id="main" class="rm-page">

    <div class="page-header reveal">
        <div>
            <h1 class="page-title" data-i18n="page.productos.title">Productos</h1>
            <p class="page-subtitle" data-i18n="page.productos.subtitle">Catalogo, stock y precios del inventario</p>
        </div>
    </div>

    <div class="toolbar reveal">
        <div class="search-wrap">
            <label class="visually-hidden-focusable" for="inputBuscar">Buscar producto</label>
            <input type="text" id="inputBuscar" class="search-input"
                placeholder="Buscar por nombre, categoria, color...">
            <button class="btn-buscar" id="btnBuscar" data-i18n="common.search">Buscar</button>
            <button class="btn-limpiar" id="btnLimpiar" data-i18n="common.clear">Limpiar</button>
        </div>
        <span id="labelStockBajo"></span>
        <button class="btn-nuevo" id="btnNuevo">+ Nuevo Producto</button>
    </div>

    <div class="filtros-wrap reveal">
        <span class="filtros-label">Genero:</span>
        <button class="filtro-chip" data-genero="Femenino" onclick="setFiltroGenero('Femenino')">Femenino</button>
        <button class="filtro-chip" data-genero="Masculino" onclick="setFiltroGenero('Masculino')">Masculino</button>
        <button class="filtro-chip" data-genero="Unisex" onclick="setFiltroGenero('Unisex')">Unisex</button>
        <button class="filtro-chip" data-genero="Nino" onclick="setFiltroGenero('Nino')">Nino</button>
        <button class="filtro-chip" data-genero="Nina" onclick="setFiltroGenero('Nina')">Nina</button>
    </div>

    <div class="reveal">
        <div class="row g-3" id="productosGrid">
            <div class="col-12 text-center text-muted py-5" data-i18n="common.loading">Cargando...</div>
        </div>
        <div id="paginacionProductos" class="paginacion-wrap"></div>
    </div>

</main>

<div id="rmFooterMount"></div>

<!-- Modal: Crear / Editar Producto -->
<div class="modal fade" id="modalProducto" tabindex="-1" aria-labelledby="modalProductoTitulo" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalProductoTitulo">Nuevo Producto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
                <form id="formProducto" novalidate>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label" for="fNombre">Nombre *</label>
                            <input type="text" class="form-control" id="fNombre" maxlength="100">
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="fDescripcion">Descripcion</label>
                            <textarea class="form-control" id="fDescripcion" rows="2" maxlength="500"></textarea>
                        </div>
                        <div class="col-6 col-md-3">
                            <label class="form-label" for="fTalla">Talla</label>
                            <input type="text" class="form-control" id="fTalla" maxlength="10" placeholder="S, M, L...">
                        </div>
                        <div class="col-6 col-md-3">
                            <label class="form-label" for="fPrecio">Precio *</label>
                            <input type="number" class="form-control" id="fPrecio" min="0.01" step="0.01" placeholder="0.00">
                        </div>
                        <div class="col-6 col-md-3">
                            <label class="form-label" for="fStock">Stock *</label>
                            <input type="number" class="form-control" id="fStock" min="0" step="1" value="0">
                        </div>
                        <div class="col-6 col-md-3">
                            <label class="form-label" for="fGenero">Genero</label>
                            <select class="form-select" id="fGenero">
                                <option value="">-- Sin especificar --</option>
                                <option value="Femenino">Femenino</option>
                                <option value="Masculino">Masculino</option>
                                <option value="Unisex">Unisex</option>
                                <option value="Nino">Nino</option>
                                <option value="Nina">Nina</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label" for="fCategoria">Categoria</label>
                            <input type="text" class="form-control" id="fCategoria" maxlength="50" placeholder="Camisas, Pantalones...">
                        </div>
                        <div class="col-6">
                            <label class="form-label" for="fColor">Color</label>
                            <input type="text" class="form-control" id="fColor" maxlength="30" placeholder="Negro, Azul...">
                        </div>
                    </div>
                </form>
                <div class="modal-error" id="modalProductoError"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnGuardar" data-i18n="common.save">Guardar</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Confirmar Eliminacion -->
<div class="modal fade" id="modalEliminar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Eliminar Producto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
                <p class="mb-3" style="font-size:0.9rem;">
                    Confirmar eliminacion de <strong id="eliminarNombre"></strong>.
                    Esta accion no se puede deshacer.
                </p>
                <label class="form-label" for="eliminarContrasena">Tu contrasena</label>
                <input type="password" class="form-control" id="eliminarContrasena"
                    placeholder="Ingresa tu contrasena" autocomplete="current-password">
                <div class="modal-error" id="modalEliminarError"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">Cancelar</button>
                <button type="button" class="btn btn-danger" id="btnConfirmarEliminar" data-i18n="common.delete">Eliminar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/rossmille.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/productos.js"></script>
<script>
    var session = initApp({ activeKey: 'productos', titleKey: 'page.productos.title', subtitleKey: 'page.productos.subtitle' });
    if (session) init();
</script>

</body>
</html>
