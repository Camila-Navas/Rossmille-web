<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSS MILLE - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f4f8;
            font-family: 'Segoe UI', sans-serif;
        }
        .topbar {
            background-color: #1a1a2e;
            color: #fff;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar .brand {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 3px;
        }
        .topbar .user-info {
            font-size: 0.9rem;
            opacity: 0.85;
        }
        .btn-logout {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            border-radius: 6px;
            padding: 6px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-left: 16px;
            transition: background 0.2s;
        }
        .btn-logout:hover {
            background: rgba(255,255,255,0.15);
        }
        .main {
            padding: 48px 32px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .welcome-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .welcome-sub {
            color: #666;
            margin-bottom: 40px;
        }
        .module-card {
            background: #fff;
            border-radius: 12px;
            padding: 28px 24px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            border: 1.5px solid transparent;
            text-decoration: none;
            color: #1a1a2e;
            display: block;
        }
        .module-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            border-color: #1a1a2e;
            color: #1a1a2e;
        }
        .module-card .icon {
            font-size: 2.2rem;
            margin-bottom: 12px;
        }
        .module-card .label {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .badge-admin {
            background: #e8f4fd;
            color: #1a5276;
            border-radius: 6px;
            padding: 3px 10px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 8px;
        }
        .coming-soon {
            opacity: 0.45;
            cursor: default;
        }
        .coming-soon:hover {
            transform: none;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            border-color: transparent;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="brand">ROSS MILLE</div>
        <div style="display:flex; align-items:center;">
            <span class="user-info" id="userInfo"></span>
            <button class="btn-logout" onclick="logout()">Cerrar Sesion</button>
        </div>
    </div>

    <div class="main">
        <div class="welcome-title" id="welcomeTitle">Bienvenido</div>
        <div class="welcome-sub">Selecciona un modulo para comenzar</div>

        <div class="row g-3" id="moduleGrid">
            <div class="col-6 col-md-4 col-lg-3">
                <a href="vender.html" class="module-card">
                    <div class="icon">&#128722;</div>
                    <div class="label">Vender</div>
                </a>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <a href="productos.html" class="module-card">
                    <div class="icon">&#128230;</div>
                    <div class="label">Productos</div>
                </a>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <a href="clientes.html" class="module-card">
                    <div class="icon">&#128100;</div>
                    <div class="label">Clientes</div>
                </a>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <a href="pedidos.html" class="module-card">
                    <div class="icon">&#128203;</div>
                    <div class="label">Pedidos</div>
                </a>
            </div>
            <div class="col-6 col-md-4 col-lg-3 admin-only" style="display:none;">
                <a href="usuarios.html" class="module-card coming-soon">
                    <div class="icon">&#128101;</div>
                    <div class="label">Usuarios <span class="badge-admin">Admin</span></div>
                </a>
            </div>
            <div class="col-6 col-md-4 col-lg-3 admin-only" style="display:none;">
                <a href="reporte.html" class="module-card coming-soon">
                    <div class="icon">&#128202;</div>
                    <div class="label">Reporte <span class="badge-admin">Admin</span></div>
                </a>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        const session = guardRoute();
        if (session) {
            document.getElementById('userInfo').textContent =
                session.nombre + ' (' + session.rol + ')';
            document.getElementById('welcomeTitle').textContent =
                'Bienvenido, ' + session.nombre;

            if (session.rol === 'Administrador') {
                document.querySelectorAll('.admin-only').forEach(function(el) {
                    el.style.display = '';
                });
            }
        }
    </script>
</body>
</html>
