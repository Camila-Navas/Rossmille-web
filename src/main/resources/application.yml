spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    # En local usa los valores por defecto (Docker). En Railway, el plugin de MySQL
    # inyecta MYSQLHOST/MYSQLPORT/MYSQLDATABASE/MYSQLUSER/MYSQLPASSWORD automaticamente.
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:rossmille_db}?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER:RossMille}
    password: ${MYSQLPASSWORD:RossMillB01}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

server:
  # Railway asigna el puerto dinamicamente via la variable PORT
  port: ${PORT:8080}

jwt:
  # IMPORTANTE: sobrescribir JWT_SECRET en las variables de entorno de Railway
  # con un valor propio y secreto antes de exponer la app publicamente.
  secret: ${JWT_SECRET:rossmille-jwt-secret-key-2024-rossmille-pos-web}
  expiration: ${JWT_EXPIRATION:28800000}
