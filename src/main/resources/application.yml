spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    # En local usa los valores por defecto (Docker). En Railway, el plugin de MySQL
    # inyecta MYSQLHOST/MYSQLPORT/MYSQLDATABASE/MYSQLUSER/MYSQLPASSWORD automaticamente.
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:rossmille_db}?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER:RossMille}
    password: ${MYSQLPASSWORD:RossMillB01}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # Flyway crea/versiona el schema (ver spring.flyway abajo); Hibernate
      # solo valida que las entidades coincidan, nunca lo modifica.
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    # El schema ya existia (docker-compose local, o una BD de Railway donde
    # alguien corrio db/init.sql a mano) antes de que este proyecto usara
    # Flyway. baseline-on-migrate le dice a Flyway: si no encuentra su tabla
    # de historial pero SI encuentra tablas de la app, no las recrees --
    # marca baseline-version como "ya aplicada" y sigue desde ahi. En una
    # base de Railway completamente vacia, Flyway simplemente corre V1 normal.
    baseline-on-migrate: true
    baseline-version: 0

server:
  # Railway asigna el puerto dinamicamente via la variable PORT
  port: ${PORT:8080}

jwt:
  # IMPORTANTE: sobrescribir JWT_SECRET en las variables de entorno de Railway
  # con un valor propio y secreto antes de exponer la app publicamente.
  secret: ${JWT_SECRET:rossmille-jwt-secret-key-2024-rossmille-pos-web}
  expiration: ${JWT_EXPIRATION:28800000}

admin:
  seed:
    # Si la tabla usuarios esta vacia al arrancar, AdminSeeder crea este
    # administrador (ver com.rossmille.config.AdminSeeder). Si estas 3
    # variables no estan definidas, no crea nada y solo deja un WARN en el
    # log -- nunca falla el arranque por esto.
    id: ${ADMIN_ID:}
    nombre: ${ADMIN_NOMBRE:}
    password: ${ADMIN_PASSWORD:}
